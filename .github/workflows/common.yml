name: Publish Python 🐍 distributions 📦 to PyPI and TestPyPI
on:
  pull_request:
    paths:
      - spiff-arena-common/**
      - .github/workflows/common.yml
      - .github/workflows/constraints.txt
  push:
    paths:
      - spiff-arena-common/pyproject.toml
    branches:
      - main

# Security: restrict GITHUB_TOKEN to least privilege.
# See: https://www.upwind.io/feed/hackerbot-claw-github-actions-pull-request-rce
permissions:
  contents: read

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install pypa/build
        run: pip install --constraint=.github/workflows/constraints.txt pip uv
      - name: Build a binary wheel and a source tarball
        run: uv build spiff-arena-common
      - name: Publish distribution 📦 to PyPI
        if: github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          user: __token__
          password: ${{ secrets.COMMON_PYPI_KEY }}
