name: Renovate

on:
  schedule:
    - cron: "0 10 * * 1-5" # 10:00 UTC weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (lookup only, no PRs)"
        type: boolean
        default: false
      log_level:
        description: "Renovate log level"
        type: choice
        options:
          - info
          - debug
        default: info

# Prevent concurrent Renovate runs from creating duplicate PRs
concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Prefer a PAT when available so Renovate PRs can trigger downstream CI,
      # and fall back to GITHUB_TOKEN when no dedicated bot token is configured.
      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        env:
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'lookup' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
        with:
          configurationFile: renovate.json5
          token: ${{ secrets.RENOVATE_TOKEN || github.token }}
